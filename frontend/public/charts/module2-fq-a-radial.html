<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粉墙热工性能对比</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7f3ea;
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    #main {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f2eee6;
    }
  </style>
</head>
<body>
  <div id="main"></div>

  <script>
    const chartDom = document.getElementById('main');
    const myChart = echarts.init(chartDom, null, {
      renderer: 'canvas',
      devicePixelRatio: window.devicePixelRatio
    });

    const walls = [
      '传统青砖\n空斗黄泥',
      '水墨宏村\n外保温',
      '际村自建房\n实砌做法',
      '新型水泥砖\n空斗砌法'
    ];

    const heatResistance = [0.379, 0.345, 0.129, 0.205];
    const heatTransferCoeff = [1.892, 2.024, 3.588, 2.821];

    const colorR = '#4f8891'; 
    const colorK = '#a1ba5b'; 

    const rMax = 0.45;
    const kMax = 4.0;
    const heatTransferScaled = heatTransferCoeff.map(v => (v / kMax) * rMax);

    const seriesDataR = heatResistance.map((val, idx) => ({
      value: val,
      realValue: val
    }));

    const seriesDataK = heatTransferScaled.map((val, idx) => ({
      value: val,
      realValue: heatTransferCoeff[idx]
    }));

    const option = {
      backgroundColor: 'transparent',
      animationDuration: 1200,
      animationEasing: 'cubicOut',
      color: [colorR, colorK],

      title: {
        text: '粉墙热工性能对比',
        subtext: '四种墙体 × 热阻 R / 传热系数 K',
        left: 'center',
        top: '4%',
        textStyle: {
          color: '#27323b',
          fontSize: 20,
          fontWeight: 'bold',
          letterSpacing: 1
        },
        subtextStyle: {
          color: '#7c8792',
          fontSize: 12,
          marginTop: 4
        }
      },

      legend: {
        top: '13%',
        left: 'center',
        itemWidth: 12,
        itemHeight: 12,
        itemGap: 18,
        icon: 'rect',
        textStyle: {
          color: '#5f6f7e',
          fontSize: 12,
          fontWeight: 500
        },
        data: ['热阻 R', '传热系数 K (已归一化显示)']
      },

      tooltip: {
        trigger: 'item',
        backgroundColor: 'rgba(255, 255, 255, 0.96)',
        borderColor: '#dce3ea',
        borderWidth: 1,
        padding: [12, 16],
        textStyle: { color: '#3a4651', fontSize: 13 },
        formatter: function (p) {
          // 排除掉中心占位圆的 tooltip
          if (p.seriesName === 'center_bg') return ''; 
          
          if (p.seriesName === '热阻 R') {
            return `<div style="font-weight:bold;margin-bottom:8px;">${p.name}</div>
                    热阻 R：<b style="color:${colorR}">${p.data.realValue.toFixed(3)}</b> m²·K/W<br/>
                    <span style="color:#8b8076;font-size:12px;">* R 值越大越优</span>`;
          }
          return `<div style="font-weight:bold;margin-bottom:8px;">${p.name}</div>
                  传热系数 K：<b style="color:${colorK}">${p.data.realValue.toFixed(3)}</b> W/(m²·K)<br/>
                  <span style="color:#8b8076;font-size:12px;">* K 值越小越优</span>`;
        }
      },

      polar: {
        center: ['50%', '58%'],
        radius: ['24%', '53%']
      },

      angleAxis: {
        type: 'category',
        data: walls,
        startAngle: 90,
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
          interval: 0,
          color: '#4a4036',
          fontSize: 13,
          fontWeight: 500,
          lineHeight: 18,
          margin: 12, 
          align: 'center'
        }
      },

      radiusAxis: {
        min: 0,
        max: rMax,
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { show: false },
        splitNumber: 4,
        splitLine: {
          show: true,
          lineStyle: {
            color: 'rgba(168, 158, 142, 0.25)',
            type: 'dashed',
            width: 1
          }
        }
      },

      graphic: [
        // 删除了原来固定像素的圆圈，只保留居中文字
        {
          type: 'text',
          left: 'center',
          top: '59%', // 根据 polar 的 center 同步调整
          z: 5,
          style: {
            text: 'R↑ 越大越优\n\nK↓ 越小越优',
            fill: '#556674',
            font: 'bold 12px "Microsoft YaHei", sans-serif',
            textAlign: 'center',
            lineHeight: 12
          }
        }
      ],

      series: [
        // 核心修复：用一个不可交互的饼图作为背景白圈，它会跟随百分比完美缩放
        {
          name: 'center_bg',
          type: 'pie',
          radius: [0, '26%'], // 这里的 26% 对应 polar 的内径
          center: ['50%', '58%'],
          silent: true, // 禁用鼠标事件
          z: 1, // 置于最底层
          itemStyle: {
            color: '#fcfbf8',
            borderColor: '#dcd1c3',
            borderWidth: 1
          },
          label: { show: false },
          data: [{ value: 1 }]
        },
        {
          name: '热阻 R',
          type: 'bar',
          coordinateSystem: 'polar',
          barWidth: '35%', 
          barGap: '15%', 
          data: seriesDataR,
          z: 2,
          itemStyle: {
            borderColor: '#f5f1e8',
            borderWidth: 1
          }
        },
        {
          name: '传热系数 K (已归一化显示)',
          type: 'bar',
          coordinateSystem: 'polar',
          barWidth: '35%',
          barGap: '15%',
          data: seriesDataK,
          z: 2,
          itemStyle: {
            borderColor: '#f5f1e8',
            borderWidth: 1
          }
        }
      ]
    };

    myChart.setOption(option);

    window.addEventListener('resize', function () {
      myChart.resize();
    });
  </script>
</body>
</html>
