<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模块二</title>
    <style>
      :root {
        --bg: #f2eee6;
        --panel: #f7f3ea;
        --ink: #4a4a48;
        --muted: #8eb8b7;
        --border: #e7dfd2;
        --accent: #f25c33;
        --shadow: rgba(74, 74, 72, 0.18);
      }

      html,
      body {
        height: 100%;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      ::-webkit-scrollbar {
        display: none;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Georgia, 'KaiTi', '楷体', '华文楷体', STKaiti, serif;
        overflow: hidden; /* iframe 内部不让滚动影响外部排版 */
      }

      .canvas {
        height: 100%;
        width: 100%;
        display: grid;
        grid-template-columns: 28% 32% 40%;
        grid-template-rows: 44% 56%;
        gap: 6px;
        padding: 0;
        box-sizing: border-box;
      }

      .slot {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 25px 45px -20px var(--shadow);
        overflow: hidden;
        position: relative;
      }

      .slot iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .tl {
        grid-column: 1;
        grid-row: 1;
      }
      .tr {
        grid-column: 2 / 4;
        grid-row: 1;
      }

      .fanWrap {
        grid-column: 1;
        grid-row: 2;
        background: var(--bg);
        border: none;
        position: relative;
        overflow: visible;
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
      }

      .bottomRight {
        grid-column: 2 / 4;
        grid-row: 2;
        display: grid;
        grid-template-columns: 42% 58%;
        grid-template-rows: 100%;
        gap: 6px;
      }

      /* SVG 扇形切换器 */
      .fanSwitch {
        width: 100%;
        height: 100%;
      }

      .fanSwitch svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .fan-path {
        fill: rgba(201, 230, 176, 0.72);
        stroke: rgba(255,255,255,0.9);
        stroke-width: 2;
        cursor: pointer;
        transition: fill 180ms ease, transform 180ms ease;
        transform-origin: 0px 400px;
      }

      .fan-path:hover {
        fill: rgba(180, 220, 155, 0.85);
      }

      .fan-path.active {
        fill: rgba(140, 200, 110, 0.95);
      }

      .fan-label {
        font-family: Georgia, 'KaiTi', '楷体', serif;
        font-size: 16px;
        fill: rgba(36, 44, 32, 0.9);
        pointer-events: none;
        font-weight: 500;
      }

      .fan-path.active + .fan-label {
        font-weight: 700;
      }

      .caption {
        position: absolute;
        left: 16px;
        top: 14px;
        font-size: 12px;
        color: rgba(110, 110, 107, 1);
        pointer-events: none;
        letter-spacing: 1px;
        z-index: 2;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="canvas" id="canvas">
      <div class="slot tl" id="slotTL">
        <div class="caption" id="tlCaption">当前构件信息</div>
      </div>
      <div class="slot tr" id="slotTR">
        <div class="caption" id="trCaption">Sankey</div>
      </div>

      <div class="fanWrap" id="fanWrap">
        <svg class="fanSwitch" id="fanSwitch" viewBox="0 0 400 400" preserveAspectRatio="xMinYMax meet" aria-label="模块二构件切换器">
          <!-- 圆心在左下角 (0, 400)，半径380，均匀5片，每片18度，带圆弧 -->
          <!-- 天井: 0-18度 -->
          <path class="fan-path" data-key="tj" d=""/>
          <text class="fan-label" data-key="tj" text-anchor="middle">天井</text>

          <!-- 粉墙: 18-36度 -->
          <path class="fan-path" data-key="fq" d=""/>
          <text class="fan-label" data-key="fq" text-anchor="middle">粉墙</text>

          <!-- 马头墙: 36-54度 -->
          <path class="fan-path" data-key="mtq" d=""/>
          <text class="fan-label" data-key="mtq" text-anchor="middle">马头墙</text>

          <!-- 屋顶: 54-72度 -->
          <path class="fan-path" data-key="wd" d=""/>
          <text class="fan-label" data-key="wd" text-anchor="middle">屋顶</text>

          <!-- 水圳系统: 72-90度 -->
          <path class="fan-path" data-key="sz" d=""/>
          <text class="fan-label" data-key="sz" text-anchor="middle">水圳系统</text>
        </svg>
      </div>

      <div class="bottomRight">
        <div class="slot bc" id="slotBC">
          <div class="caption" id="bcCaption">副图</div>
        </div>
        <div class="slot br" id="slotBR">
          <div class="caption" id="brCaption">词云</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const mapping = {
          mtq: {
            tr: './马头墙桑葚图.html',
            bc: './马头墙花纹样式旭日图.html',
            br: './词云图.html#mtq',
            // 左上“波浪曲线概览”（匹配参考截图的左上视觉结构）
            tlSrc: './马头墙波浪概览图.html',
            tl: '马头墙：概览',
          },
          tj: {
            tr: './天井桑葚图.html',
            bc: './天井弦图.html',
            br: './词云图.html#tj',
            tlSrc: './天井桑葚图.html',
            tl: '天井：功能链路概览',
          },
          fq: {
            tr: './粉墙桑葚图.html',
            bc: './粉墙雷达图.html',
            br: './词云图.html#fq',
            tlSrc: './粉墙雷达图.html',
            tl: '粉墙：装饰构成概览',
          },
          wd: {
            tr: './屋顶桑葚图.html',
            bc: './屋顶半环图.html',
            br: './词云图.html#wd',
            tlSrc: './屋顶桑葚图.html',
            tl: '屋顶：空间适配概览',
          },
          sz: {
            tr: './水圳系统桑葚图.html',
            bc: './水圳系统桑葚图.html',
            br: './水圳词云图.html',
            tlSrc: './水圳系统桑葚图.html',
            tl: '水圳系统：结构构成概览',
          },
        }

        const slotTL = document.getElementById('slotTL')
        const slotTR = document.getElementById('slotTR')
        const slotBC = document.getElementById('slotBC')
        const slotBR = document.getElementById('slotBR')

        const tlCaption = document.getElementById('tlCaption')
        const trCaption = document.getElementById('trCaption')
        const bcCaption = document.getElementById('bcCaption')
        const brCaption = document.getElementById('brCaption')

        const fanSwitch = document.getElementById('fanSwitch')
        const segs = Array.from(fanSwitch.querySelectorAll('.fan-path'))
        const labels = Array.from(fanSwitch.querySelectorAll('.fan-label'))

        const R = 380
        const CX = 0, CY = 400  // 圆心（左下角）
        const KEYS = ['tj', 'fq', 'mtq', 'wd', 'sz']
        const ACTIVE_DEG = 28   // 选中片的角度
        const NORMAL_DEG = (90 - ACTIVE_DEG) / 4  // 其余四片均分剩余角度

        // 标签在扇形中间偏外侧的位置
        const LABEL_R = 260
        const LABEL_CONFIGS = {
          tj:  { vertical: false },
          fq:  { vertical: false },
          mtq: { vertical: false },
          wd:  { vertical: false },
          sz:  { vertical: true  },
        }

        function degToRad(d) { return d * Math.PI / 180 }

        // 从圆心出发，角度从水平（0度=右）逆时针算，但我们从水平向右开始，向上为正
        // 扇形从 startAngle 到 endAngle（相对水平，逆时针）
        function fanPath(startDeg, endDeg) {
          // startDeg=0 => 水平向右 => SVG中 (CX+R, CY)
          // 逆时针增大 => 向上
          const s = degToRad(startDeg)
          const e = degToRad(endDeg)
          const x1 = CX + R * Math.cos(s)
          const y1 = CY - R * Math.sin(s)
          const x2 = CX + R * Math.cos(e)
          const y2 = CY - R * Math.sin(e)
          return `M${CX},${CY} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 0,0 ${x2.toFixed(1)},${y2.toFixed(1)} Z`
        }

        function labelPos(midDeg) {
          const r = degToRad(midDeg)
          return {
            x: CX + LABEL_R * Math.cos(r),
            y: CY - LABEL_R * Math.sin(r)
          }
        }

        function updateFan(activeKey) {
          // 计算每片角度
          const angles = KEYS.map(k => k === activeKey ? ACTIVE_DEG : NORMAL_DEG)
          // 从0度（水平右）开始，逆时针排列
          let cursor = 0
          KEYS.forEach((k, i) => {
            const seg = fanSwitch.querySelector(`.fan-path[data-key="${k}"]`)
            const lbl = fanSwitch.querySelector(`.fan-label[data-key="${k}"]`)
            const start = cursor
            const end = cursor + angles[i]
            cursor = end
            if (seg) seg.setAttribute('d', fanPath(start, end))
            if (lbl) {
              const mid = (start + end) / 2
              const pos = labelPos(mid)
              lbl.setAttribute('x', pos.x.toFixed(1))
              lbl.setAttribute('y', pos.y.toFixed(1))
              if (LABEL_CONFIGS[k] && LABEL_CONFIGS[k].vertical) {
                lbl.setAttribute('writing-mode', 'tb')
              } else {
                lbl.removeAttribute('writing-mode')
              }
            }
            if (seg) seg.classList.toggle('active', k === activeKey)
          })
        }

        function renderIFrame(slotEl, src, scale, center) {
          slotEl.querySelectorAll('iframe').forEach((x) => x.remove())
          const iframe = document.createElement('iframe')
          iframe.src = src
          iframe.loading = 'eager'
          iframe.referrerPolicy = 'no-referrer'
          iframe.setAttribute('scrolling', 'no')
          if (typeof scale === 'number' && scale > 0 && scale <= 1) {
            const inv = 100 / scale
            iframe.style.width = `${inv}%`
            iframe.style.height = `${inv}%`
            if (center) {
              iframe.style.position = 'absolute'
              iframe.style.top = '50%'
              iframe.style.left = '50%'
              iframe.style.transform = `translate(-50%, -50%) scale(${scale})`
              iframe.style.transformOrigin = 'center center'
            } else {
              iframe.style.transform = `scale(${scale})`
              iframe.style.transformOrigin = 'top left'
            }
          } else {
            // 无缩放，直接铺满容器
            iframe.style.width = '100%'
            iframe.style.height = '100%'
            iframe.style.border = '0'
            iframe.style.display = 'block'
          }
          slotEl.appendChild(iframe)
        }

        function render(key) {
          const page = mapping[key]
          if (!page) return

          currentKey = key
          renderIFrame(slotTL, page.tlSrc, 0.55)
          renderIFrame(slotTR, page.tr, 0.64)
          renderIFrame(slotBC, page.bc, null, true)
          renderIFrame(slotBR, page.br, 0.60)
        }

        let currentKey = 'mtq'

        function layoutSegments(key) {
          updateFan(key)
        }

        segs.forEach((seg) => {
          seg.addEventListener('click', function () {
            const key = seg.dataset.key
            currentKey = key
            updateFan(key)
            render(key)
          })
        })

        updateFan('mtq')
        render('mtq')

        window.addEventListener('resize', function () {
          updateFan(currentKey)
        })
      })()
    </script>
  </body>
</html>
