<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>模块一</title>
  <style>
    :root {
      --bg: #E8E6E1;
      --card: #FCFCFC;
      --ink: #4A4A48;
      --muted: #8EB8B7;
      --border: #F2EFE9;
      --accent: #F25C33;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 24px 16px;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: 0 25px 45px -20px rgba(74,74,72,0.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 2px;
    }
    p { margin: 8px 0; color: var(--muted); line-height: 1.8; }
    .note {
      background: rgba(242, 92, 51, 0.08);
      border: 1px solid rgba(242, 92, 51, 0.25);
      border-radius: 14px;
      padding: 14px 14px;
      color: var(--ink);
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>模块一：三省地图热力 · 点击联动折线图 · 重点建筑点位</h1>

    <div class="note">
      你可以把模块一 UI 组跑出来的现成 HTML 放到 `c:\version1/` 目录（与本文件同级），
      我会立刻把它接到这个模块入口里，并补上你材料中描述的“右侧介绍区”和“城市点击联动折线图”联动逻辑。
    </div>
  </div>
</body>
</html>
